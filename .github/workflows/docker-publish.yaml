name: Docker build and publish

permissions:
  pull-requests: write
  contents: write

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/frankenphp/Dockerfile
          target: production
          push: true
          build-args: |
            VERSION=8.5
          tags: |
            ghcr.io/99linesofcode/${{ inputs.image_name }}:${{ github.ref_name }}
            ghcr.io/99linesofcode/${{ inputs.image_name }}:latest
